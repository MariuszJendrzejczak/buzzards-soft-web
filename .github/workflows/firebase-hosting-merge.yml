name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build, test, and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Build BEFORE tests: the SSG-layer suites (feature-flag-matrix-ssg,
      # ssg-output) assert on the static export under out/, so it must exist
      # when vitest runs.
      - name: Build (next build + RSC payload copy)
        run: npm run build

      - name: Unit tests (vitest)
        run: npm test

      - name: Deploy to Firebase Hosting — live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUZZARDS_SOFT_WEB }}
          channelId: live
          projectId: buzzards-soft-web
