name: Deploy preview channel on pull request

on:
  pull_request:
    branches:
      - main

concurrency:
  group: firebase-hosting-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    name: Build, test, and deploy preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on PRs opened from forks — secrets are unavailable there and the
    # deploy step would fail noisily. Owner-pushed PRs run as normal.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Build BEFORE tests: the SSG-layer suites (feature-flag-matrix-ssg,
      # ssg-output) assert on the static export under out/, so it must exist
      # when vitest runs.
      - name: Build (next build + RSC payload copy)
        run: npm run build

      - name: Unit tests (vitest)
        run: npm test

      - name: Deploy to Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUZZARDS_SOFT_WEB }}
          projectId: buzzards-soft-web
          expires: 7d
